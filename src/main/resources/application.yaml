spring:
  application:
    name: weatherapi

  datasource:
    url: jdbc:postgresql://localhost:5432/weatherdb
    username: weather-api
    password: changemeinprod!
    driver-class-name: org.postgresql.Driver

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379

weather:
  api:
    key: ${WEATHER_API_KEY}
    base-url: https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services